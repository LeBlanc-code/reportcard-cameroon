{% extends 'accounts/base.html' %}

{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <h4 class="card-title mb-3">Check your email</h4>
                <p class="text-muted">If an account exists for that email, a password reset link has been sent.</p>
                <a href="{% url 'login' %}" class="btn btn-secondary mt-3">Return to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
